name: ci

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y libarchive-dev
      - run: python -m pip install --upgrade pip
      - run: pip install -r apps/worker/requirements.txt
      - run: python scripts/generate_fixtures.py
      - name: Install Playwright browsers
        run: pnpm --filter @archive-vet/web exec playwright install chromium
      - name: E2E (web + worker)
        run: |
          cd apps/worker && uvicorn src.main:app --host 127.0.0.1 --port 8000 &
          sleep 5
          cd ../.. && pnpm --filter @archive-vet/web exec playwright test
        env:
          ARCHIVEVET_WORKER_URL: http://127.0.0.1:8000
          CI: "true"

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y libarchive-dev p7zip-full
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python ../../scripts/generate_fixtures.py
      - run: pytest -q

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
