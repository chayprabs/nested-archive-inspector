services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      ARCHIVEVET_WORKER_URL: http://worker:8000
    ports:
      - "3000:3000"
    depends_on:
      worker:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
